    <!--Contact Us-->

<section class="main_heading my-5 pt-5">
  <div class="text-center">
    <h1 class="display-4">Contact Us</h1>
    <hr class="w-25 mx-auto">
  </div>

  <div class="container">
    <div class="row">
      <div class="col-xxl-8 col-10 col-md-8 mx-auto">

        <form id="contactForm">

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="password" placeholder="Enter your name">
          </div>

          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            <div class="form-text">We'll never share your email with anyone else.</div>
          </div>

          

           <div class="mb-3">
            <label class="pr-4">Gender</label>
            <div class="form-check form-check-inline">
           <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
           <label class="form-check-label" for="inlineCheckbox1">Female</label>
           </div>
           <div class="form-check form-check-inline">
           <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
           <label class="form-check-label" for="inlineCheckbox2">Male</label>
    </div>
    <div class="form-check form-check-inline">
  
   </div>
           </div>

           <div class="mb-3">
            <label for="exampleDataList" class="form-label">Select City</label>
            <input class="form-control" list="datalistOptions" id="exampleDataList" placeholder="Type to search...">
            <datalist id="datalistOptions">
            <option value="San Francisco"></option>
            <option value="New York"></option>
            <option value="Seattle"></option>
            <option value="Los Angeles"></option>
            <option value="Chicago">
            </datalist>
           </div>

           <div class="mb-3">
            <div class="form-file">
         <input type="file" class="form-file-input" id="customFile">
  
         <label class="form-file-label" for="customFile">
         <span class="form-file-text">Choose file</span>
        <span class="form-file-button">Browse</span>
       </label>
        </div>
           </div>
          <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label">Example textarea</label>
        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
        </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="check">
            <label class="form-check-label">Check me out</label>
          </div>

          <button type="submit" class="btn btn-primary">Submit</button>

        </form>

        <!-- <p id="successMsg" class="text-success mt-3" style="display:none;">
          Form submitted successfully ✅
        </p> -->

      </div>
